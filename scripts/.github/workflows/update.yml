name: 每日自動更新本月待辦

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-todos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 \
                      google-api-python-client

      - name: 執行更新腳本
        env:
          GMAIL_TOKEN_JSON:   ${{ secrets.GMAIL_TOKEN_JSON }}
          GDRIVE_TOKEN_JSON:  ${{ secrets.GDRIVE_TOKEN_JSON }}
          BROCHURE_FOLDER_ID: ${{ secrets.BROCHURE_FOLDER_ID }}
        run: python scripts/update_todos.py

      - name: 將 todos.json 推回 repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add todos.json
          git diff --staged --quiet || git commit -m "auto: update todos $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
